<h2>Agregar Libro</h2>

<form id="formLibro">
    <input type="text" name="titulo" placeholder="Título" required>

    <select name="autor_id" required>
        <option value="1">Autor 1</option>
        <option value="2">Autor 2</option>
    </select>

    <select name="categoria_id" required>
        <option value="1">Categoría 1</option>
        <option value="2">Categoría 2</option>
    </select>

    <button type="submit">Guardar</button>
</form>

<hr>

<h2>Libros</h2>

<table border="1">
<thead>
<tr>
<th>ID</th>
<th>Título</th>
<th>Autor</th>
<th>Categoría</th>
</tr>
</thead>
<tbody id="tablaLibros"></tbody>
</table>

<script src="js/app.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function() {

    cargar("libros", "tablaLibros");

    document.getElementById("formLibro").addEventListener("submit", function(e){
        e.preventDefault(); // 🔥 esto evita que se vaya por GET

        const formData = new FormData(this);

        fetch("../backend/router.php?route=libros", {
            method: "POST",
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            console.log(data);
            cargar("libros", "tablaLibros");
            this.reset();
        });
    });

});
</script>
